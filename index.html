<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>saykinho</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #ffffff;
            color: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 40px;
        }

        .logo {
            width: 420px;
            max-width: 90%;
            margin-bottom: 40px;
        }

        .tagline {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .message {
            font-size: 1rem;
            color: #888;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .links a {
            display: inline-block;
            margin: 0 10px;
            color: #4b88c7;
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }

        footer {
            margin-top: 60px;
            color: #aaa;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="container">

        <img src="logo.png" alt="saykinho" class="logo">

        <div class="message">
            Under development.
        </div>

        <footer>
            © 2026 saykinho.com
        </footer>

    </div>

</body>
</html>
